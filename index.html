<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="hackerone-reporting" content="example-value">
    <title>VirtuesTech</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, Segoe UI, sans-serif;
            background: linear-gradient(160deg, #f8fafc 0%, #e2e8f0 100%);
            color: #1e293b;
        }
        main {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: clamp(1.75rem, 4vw, 2.25rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0 0 2rem;
        }
        .logos {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        .logos a {
            display: block;
            padding: 1rem 1.25rem;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
            transition: transform .2s ease, box-shadow .2s ease;
        }
        .logos a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,0,0,.1);
        }
        .logos img {
            display: block;
            height: 40px;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <main>
        <h1>Welcome to NavN</h1>
        <div class="logos">
            <a href="#" aria-label="Meta"><img src="meta.png" alt="Meta" width="80" height="40" loading="lazy"></a>
            <a href="https://www.hackerone.com" aria-label="HackerOne"><img src="https://www.hackerone.com/themes/custom/hackerone/logo.svg" alt="HackerOne" width="80" height="40" loading="lazy"></a>
        </div>
    </main>
</body>
</html>
